name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.11.1
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Build with Gradle
      run: gradle assembleRelease --stacktrace --info --warning-mode all
      working-directory: android
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Prepare APK filename
      run: |
        mkdir -p android/app/build/outputs/apk/debug
        cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/debug/app-debug.apk
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: latest
        name: Latest Build
        files: android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
