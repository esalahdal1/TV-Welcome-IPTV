<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساكن الصفا - ترحيب النزلاء</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;700;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            background: #020617;
            color: white;
        }

        /* خلفية حيوية متطورة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            z-index: -1;
        }

        .animated-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        /* جزيئات ضوئية عائمة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 0 50px;
        }

        /* الهيدر: الساعة والطقس */
        .top-bar {
            position: absolute;
            top: 50px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .clock-container {
            text-align: right;
        }

        .time {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date {
            font-size: 1rem;
            font-weight: 300;
            opacity: 0.8;
            margin-top: 5px;
        }

        .weather-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px 25px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .weather-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .weather-city {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 3px;
        }

        /* المحتوى الرئيسي */
        .hotel-brand {
            margin-bottom: 30px;
        }

        .hotel-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: #fbbf24;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        .welcome-msg {
            font-size: 2.2rem;
            font-weight: 200;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .guest-name {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 15px;
            text-shadow: 0 20px 50px rgba(0,0,0,0.6);
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .welcome-sub {
            font-size: 1.4rem;
            font-weight: 300;
            opacity: 0.6;
            max-width: 700px;
        }

        /* الفوتر واللوجو */
        .footer {
            position: absolute;
            bottom: 40px;
            right: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .company-info {
            text-align: right;
        }

        .company-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .company-sub {
            font-size: 0.65rem;
            opacity: 0.5;
            letter-spacing: 0.5px;
        }

        .logo-box {
            width: 75px;
            height: 75px;
            background: white;
            border-radius: 50%; /* دائري مثل اللوقو */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #0056b3;
        }

        .logo-box img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        /* تلميح الريموت */
        .remote-hint {
            position: absolute;
            bottom: 40px;
            left: 50px;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.6);
        }

        .key-badge {
            background: #fbbf24;
            color: #020617;
            padding: 2px 12px;
            border-radius: 8px;
            font-weight: 900;
            box-shadow: 0 4px 0 #b45309;
        }

        .fade-in {
            animation: fadeIn 2.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div id="particles" class="particles"></div>

    <div class="main-content">
        <div class="top-bar">
            <div class="clock-container">
                <div id="time" class="time">00:00</div>
                <div id="date" class="date">الأثنين، 23 مارس</div>
            </div>
            <div id="weather" class="weather-container">
                <div class="weather-info">
                    <i id="weather-icon" class="fas fa-cloud-sun"></i>
                    <span id="temp">--°C</span>
                </div>
                <div class="weather-city">جدة - حي الصفا، المملكة العربية السعودية</div>
            </div>
        </div>

        <div class="fade-in">
            <div class="hotel-brand">
                <div class="hotel-name">مساكن الصفا</div>
                <div style="width: 80px; height: 2px; background: #fbbf24; margin: 0 auto; border-radius: 2px;"></div>
            </div>
            <div class="welcome-msg">مرحباً بك</div>
            <div id="guestName" class="guest-name">...</div>
            <div class="welcome-sub">يسعدنا جداً استضافتك، نتمنى لك إقامة مريحة وهادئة في رحاب مساكن الصفا</div>
        </div>

        <div class="remote-hint">
            <span>اضغط</span>
            <span class="key-badge">OK</span>
            <span>لزيارة موقعنا الإلكتروني</span>
        </div>

        <div class="footer">
            <div class="company-info">
                <div class="company-name">شركة مساكن الرفاهية</div>
                <div class="company-sub">MASAKEN ALRAFAHYA COMPANY</div>
            </div>
            <div id="logoContainer" class="logo-box">
                <!-- لوقو MRC بتصميم SVG متطابق مع الشعار المرسل -->
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- الدائرة المحيطة -->
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#blueGradient)" stroke-width="2.5"/>
                    <!-- المباني -->
                    <path d="M35 70 V45 H45 V70 M48 70 V35 H58 V70 M62 70 V50 H72 V70" fill="none" stroke="#1e40af" stroke-width="2"/>
                    <!-- المفتاح في الأعلى -->
                    <circle cx="75" cy="30" r="4" fill="#1e40af" />
                    <path d="M75 30 L85 30 M82 30 V33 M85 30 V33" stroke="#1e40af" stroke-width="1.5"/>
                    <!-- الباب الصغير على اليسار -->
                    <path d="M25 65 Q25 55 30 55 Q35 55 35 65 V70 H25 V65" fill="#1e40af" opacity="0.8"/>
                    <!-- نص MRC -->
                    <text x="50" y="88" font-family="Cairo" font-size="14" font-weight="900" fill="#1e40af" text-anchor="middle">MRC</text>
                    <!-- التدرج اللوني -->
                    <defs>
                        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Supabase
        const SUPABASE_URL = 'https://cewbmexcmhrogbvyfvrg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_MCDhff2Dztq4pp3ASoWX3A_inNp10mx';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // إنشاء جزيئات عائمة
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                p.style.animationDelay = (Math.random() * 20) + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // تحديث الساعة والتاريخ
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'م' : 'ص';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            
            document.getElementById('time').innerText = `${hours}:${minutes} ${ampm}`;

            // التاريخ الميلادي (نستخدم ar-EG لضمان بقائه ميلادياً)
            const gregDate = now.toLocaleDateString('ar-EG', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });

            // التاريخ الهجري (تقويم القرى)
            let hijriDate = "";
            try {
                hijriDate = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                }).format(now);
                
                // إذا لم يدعم المتصفح التقويم الهجري وعاد الميلادي (مثل 2026)
                if (hijriDate.includes(now.getFullYear().toString()) || hijriDate.includes('٢٠٢٦')) {
                    // نستخدم مكتبة أو حساب بسيط تقريبي (1447 هـ)
                    hijriDate = "شوال 1447"; 
                }
            } catch (e) {
                hijriDate = "1447";
            }

            document.getElementById('date').innerHTML = `${gregDate}<br>${hijriDate} هـ`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // جلب الطقس (جدة كمثال)
        async function fetchWeather() {
            try {
                // استخدام wttr.in لجلب الطقس بصيغة JSON لجدة
                const response = await fetch('https://wttr.in/Jeddah?format=j1');
                const data = await response.json();
                const temp = data.current_condition[0].temp_C;
                const desc = data.current_condition[0].weatherDesc[0].value;
                
                document.getElementById('temp').innerText = `${temp}°C`;
                
                // تحديث الأيقونة بناءً على الوصف (تبسيط)
                const icon = document.getElementById('weather-icon');
                if (desc.toLowerCase().includes('sun')) icon.className = 'fas fa-sun';
                else if (desc.toLowerCase().includes('cloud')) icon.className = 'fas fa-cloud';
                else if (desc.toLowerCase().includes('rain')) icon.className = 'fas fa-cloud-showers-heavy';
                else icon.className = 'fas fa-cloud-sun';

            } catch (err) {
                console.error('Weather error:', err);
                document.getElementById('temp').innerText = '28°C'; // Fallback
            }
        }
        fetchWeather();
        setInterval(fetchWeather, 1800000); // كل 30 دقيقة

        // جلب اسم النزيل
        async function fetchGuest() {
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room');
            const nameElement = document.getElementById('guestName');

            if (!room) {
                nameElement.innerText = "ضيفنا العزيز";
                return;
            }

            try {
                const { data, error } = await _supabase
                    .from('guests')
                    .select('full_name')
                    .eq('room_number', room)
                    .maybeSingle();

                if (data && data.full_name) {
                    nameElement.innerText = data.full_name;
                } else {
                    nameElement.innerText = "ضيفنا العزيز";
                }
            } catch (err) {
                console.error('Error:', err);
            }
        }
        fetchGuest();
        setInterval(fetchGuest, 10000);

        // مراقبة أزرار الريموت
        document.addEventListener('keydown', function(event) {
            console.log('Key pressed:', event.key);
            const keyCode = event.keyCode || event.which || 0;
            if (
                event.key === 'Enter' ||
                event.key === 'OK' ||
                event.key === 'Select' ||
                event.code === 'Enter' ||
                keyCode === 23 ||
                keyCode === 66
            ) {
                window.location.href = 'https://www.masaken-rc.com.sa';
            }
        });
    </script>
</body>
</html>
